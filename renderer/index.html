<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>PDE</title>
  <link rel="stylesheet" href="./ui/main.css">
</head>
<body>
  <div id="loading-overlay">
    <img id="loading-icon" src="" alt="Loading Icon" />
    <div id="loading-text">텍스쳐 로딩중...</div>
  </div>

  <div id="main-content">
    <canvas id="renderCanvas"></canvas>
    <div id="scene-toolbar" aria-hidden="true">
      <i>&#xE061;</i><i>&#xE5C6;</i><i class="player-head-icon"></i><i>&#xE198;</i><i>&#xE1D3;</i>
    </div>
  </div>

  <div id="left-panel-dock" class="panel-dock dock-left empty">
    <div class="scene-resizer"></div>
    <div class="details-resizer"></div>
  </div>

  <div id="right-panel-dock" class="panel-dock dock-right">
    <div class="scene-resizer"></div>
    <section id="scene-objects" class="panel-section">
      <div id="scene-panel-header" draggable="true">씬 오브젝트</div>
      <div id="scene-object-list"></div>
    </section>
    <div class="details-resizer"></div>
    <section id="project-details" class="panel-section">
      <div id="project-details-header" draggable="true">
        <span id="details-title">프로젝트 세부 정보</span>
        <div id="project-tabs" draggable="false">
          <button id="previous-project" type="button" disabled aria-label="이전 프로젝트">&lt;</button>
          <button id="project-tab" type="button">프로젝트 탭</button>
          <button id="next-project" type="button" disabled aria-label="다음 프로젝트">&gt;</button>
          <div id="project-tab-menu" hidden></div>
        </div>
      </div>
      <dl id="project-properties">
        <div><dt>이름</dt><dd><input id="project-name" type="text"></dd></div>
        <div><dt>프로젝트 NBT</dt><dd><input id="project-mainNBT" type="text"></dd></div>
        <div><dt>전체 NBT</dt><dd><input id="project-nbt" type="text"></dd></div>
        <div><dt>전역 밝기</dt><dd class="global-brightness"><input id="global-brightness-enabled" type="checkbox"><span>하늘</span><select id="global-brightness-sky"></select><span>블럭</span><select id="global-brightness-block"></select></dd></div>
      </dl>
      <section id="multi-selection-pivot" class="object-property" hidden></section>
      <div id="object-properties" hidden></div>
    </section>
  </div>

  <div id="fps-counter">FPS: --</div>

  <script type="module" src="./renderer.ts"></script>
</body>
</html>
